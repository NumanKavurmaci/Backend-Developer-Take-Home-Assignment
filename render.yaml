services:
  - type: web
    name: saatcms-middleware-demo
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build
    preDeployCommand: npm run db:migrate:deploy && npm run db:check
    startCommand: npm start
    healthCheckPath: /ready
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOYMENT_ENV
        value: demo
      - key: CMS_API_KEYS
        sync: false
      - key: CMS_AUTH_ATTEMPT_LIMIT_PER_MINUTE
        value: "300"
      - key: CMS_RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: CMS_MAX_BODY_BYTES
        value: "1048576"
      - key: CMS_MUTATIONS_ENABLED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: saatcms-postgres-demo
          property: connectionString

databases:
  - name: saatcms-postgres-demo
    databaseName: saatcms
    user: saatcms_app
    postgresMajorVersion: "18"
    region: frankfurt
    plan: basic-256mb
    ipAllowList: []
