services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: saatcms
      POSTGRES_USER: saatcms
      POSTGRES_PASSWORD: saatcms_local
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saatcms -d saatcms"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/postgres/init-test-database.sql:/docker-entrypoint-initdb.d/10-init-test-database.sql:ro
    restart: unless-stopped

volumes:
  postgres_data:
