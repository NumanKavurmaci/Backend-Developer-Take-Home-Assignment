name: CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:../data/test.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Verify disposable test database
        run: npm run db:test

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
