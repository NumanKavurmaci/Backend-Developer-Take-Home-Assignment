name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://saatcms:saatcms_ci@localhost:5432/saatcms_test?schema=public
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: saatcms_test
          POSTGRES_USER: saatcms
          POSTGRES_PASSWORD: saatcms_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saatcms -d saatcms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply PostgreSQL migrations
        run: npm run db:migrate:deploy

      - name: Verify disposable test database
        run: npm run db:test

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
