name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://saatcms_ci:saatcms_ci_password@localhost:5432/saatcms_test?schema=public
    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_DB: saatcms_test
          POSTGRES_USER: saatcms_ci
          POSTGRES_PASSWORD: saatcms_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saatcms_ci -d saatcms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Verify Node.js major
        run: node -e "if (Number(process.versions.node.split('.')[0]) !== 24) process.exit(1); console.log(process.version)"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply PostgreSQL migrations
        run: npm run db:migrate:deploy

      - name: Prove PostgreSQL connection
        run: npm run db:check

      - name: Typecheck
        run: npm run typecheck

      - name: Coverage
        run: npm run test:coverage

      - name: Concurrent test database isolation
        run: npm run test:isolation

      - name: Build
        run: npm run build

  deployment-build:
    name: Exact Render deployment path
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      DEPLOYMENT_ENV: demo
      DATABASE_URL: postgresql://saatcms_ci:saatcms_ci_password@localhost:5432/saatcms?schema=public
    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_DB: saatcms
          POSTGRES_USER: saatcms_ci
          POSTGRES_PASSWORD: saatcms_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saatcms_ci -d saatcms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Render build command
        run: npm ci --include=dev && npm run db:generate && npm run build

      - name: Render pre-deploy command
        run: npm run db:migrate:deploy && npm run db:check
