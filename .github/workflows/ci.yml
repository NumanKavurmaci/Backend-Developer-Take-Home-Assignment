name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  database-validation:
    name: Database and test validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DEPLOYMENT_ENV: test
      DATABASE_URL: postgresql://saatcms_ci:saatcms_ci_password@localhost:5432/saatcms_test?schema=public
    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_DB: saatcms_test
          POSTGRES_USER: saatcms_ci
          POSTGRES_PASSWORD: saatcms_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saatcms_ci -d saatcms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply PostgreSQL migrations
        run: npm run db:migrate:deploy

      - name: Prove PostgreSQL connection
        run: npm run db:check

      - name: Test with coverage gate
        run: npm run test:coverage

      - name: Test concurrent database isolation
        run: npm run test:isolation

  deployment-rehearsal:
    name: Render deployment rehearsal
    needs: [static-validation, database-validation]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: production
      DEPLOYMENT_ENV: demo
      DATABASE_URL: postgresql://saatcms_ci:saatcms_ci_password@localhost:5432/saatcms?schema=public
    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_DB: saatcms
          POSTGRES_USER: saatcms_ci
          POSTGRES_PASSWORD: saatcms_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saatcms_ci -d saatcms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run Render build command
        run: npm ci --include=dev && npm run db:generate && npm run build

      - name: Run Render pre-deploy command
        run: npm run db:migrate:deploy && npm run db:check
